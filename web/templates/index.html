<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fashion Recommendation Studio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="container">
    <h1>Fashion Recommendation Studio</h1>
    <p class="subtitle">Simple Flask UI for the key recommendation tasks in this repository.</p>

    <section class="card">
      <h2>1) Outfit Compatibility Score</h2>
      <form action="/compatibility" method="post">
        <label>Choose sample outfit</label>
        <select name="set_id" required>
          {% for set_id in outfit_ids %}
            <option value="{{ set_id }}">{{ set_id }}</option>
          {% endfor %}
        </select>
        <button type="submit">Score Outfit</button>
      </form>
    </section>

    <section class="card">
      <h2>2) Fill-in-the-Blank (Item Replacement)</h2>
      <form action="/fill-in-blank" method="post">
        <label>Choose sample outfit</label>
        <select name="set_id" required>
          {% for set_id in outfit_ids %}
            <option value="{{ set_id }}">{{ set_id }}</option>
          {% endfor %}
        </select>
        <button type="submit">Generate Replacements</button>
      </form>
    </section>

    <section class="card">
      <h2>3) Multimodal Recommendation</h2>
      <form action="/multimodal" method="post">
        <label>Text query (e.g., "jacket jeans")</label>
        <input type="text" name="text_query" placeholder="casual denim jacket" />

        <label>Preferred categories (optional)</label>
        <select name="preferred_categories" multiple size="8">
          {% for cid, cname in category_choices %}
            <option value="{{ cid }}">{{ cid }} - {{ cname }}</option>
          {% endfor %}
        </select>
        <button type="submit">Rank Outfits</button>
      </form>
    </section>
  </main>
</body>
</html>
